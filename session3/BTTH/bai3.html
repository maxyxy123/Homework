<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du lịch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.hero{
    height:500px;

    background-image:url("./anh-mo-ta.jpg");
    background-size:cover;      
    background-position:center; 
    background-repeat:no-repeat;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;
    padding:20px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 2px 8px rgba(0,0,0,0.6);
}

.hero p{
    max-width:700px;
    line-height:1.6;
    text-shadow:0 2px 8px rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<section class="hero">
    <h1>Khám Phá Vẻ Đẹp Thiên Nhiên</h1>
    <p>
        Đắm mình vào những cảnh quan hùng vĩ, tận hưởng không khí trong lành
        và tạo nên những kỷ niệm khó quên tại những điểm đến tuyệt vời nhất.
    </p>
</section>

</body>
</html>
