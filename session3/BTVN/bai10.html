<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Maxyxy</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
}

body {
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
}

/* Nền kết hợp RGBA mờ + background-image */
.portfolio {
  min-height: 100vh;
  background:
    linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
    url("test..")
    center / cover no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

.card {
  width: 420px;
  padding: 45px 35px;
  text-align: center;
  background-color: rgba(255, 255, 255, 0.92);
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
}

.label {
  font-size: 13px;
  letter-spacing: 6px;
  color: #1e88e5;
  font-weight: 700;
  margin-bottom: 18px;
}

.name {
  position: relative;
  font-size: 3rem;
  color: #222;
  margin-bottom: 28px;
}

.name::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -12px;
  transform: translateX(-50%);
  width: 55px;
  height: 4px;
  background-color: #1e88e5;
  border-radius: 10px;
}

.desc {
  font-size: 16px;
  line-height: 1.7;
  color: #555;
  margin-bottom: 30px;
}

.btn {
  display: inline-block;
  padding: 13px 28px;
  background-color: #1e88e5;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-size: 15px;
  font-weight: 600;
  transition: 0.3s;
}


.btn:hover {
  background-color: #0d47a1;
  transform: translateY(-3px);
}
  </style>
</head>
<body>

  <section class="portfolio">
    <div class="card">
      <p class="label">PORTFOLIO</p>

      <h1 class="name">maxyxy</h1>

      <p class="desc">
       Lorem ipsum dolor sit amet consectetur adipisicing elit. Harum culpa perspiciatis in qui vel officia delectus facere quod. Optio delectus voluptatem iusto, aperiam suscipit quae doloremque. Quae voluptatum aliquam vero?
      </p>

      <a href="#" class="btn">Tải CV</a>
    </div>
  </section>

</body>
</html>
