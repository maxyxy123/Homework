<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <section class="min-h-screen bg-slate-100 flex items-center justify-center px-6">
  <form class="w-full max-w-xl bg-white rounded-2xl shadow-md p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Địa điểm đến
      </label>
      <input
        type="text"
        placeholder="Nhập địa điểm bạn muốn đến"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Ngày đi
      </label>
      <input
        type="date"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400"
      />
    </div>

    <button
      type="submit"
      class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 rounded-lg transition-colors duration-300"
    >
      Tìm kiếm
    </button>
  </form>
</section>
</body>
</html>
