<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <section class="min-h-screen bg-slate-100 dark:bg-slate-950 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-4xl">
    
    <div class="text-center mb-8">
      <button class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-6 py-3 rounded-full transition-colors duration-300">
        Đổi Giao Diện
      </button>
    </div>

    <div class="bg-white dark:bg-slate-800 text-gray-800 dark:text-white rounded-2xl shadow-lg p-8 transition-colors duration-300">
      <h2 class="text-3xl font-bold text-center mb-6">
        Bảng Giá Tour Du Lịch
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="border border-gray-200 dark:border-slate-700 rounded-xl p-6 text-center">
          <h3 class="text-xl font-bold mb-3">
            Tour Đà Nẵng
          </h3>
          <p class="text-gray-600 dark:text-slate-300 mb-4">
            3 ngày 2 đêm
          </p>
          <p class="text-2xl font-bold text-sky-600 dark:text-sky-400">
            3.500.000đ
          </p>
        </div>

        <div class="border border-gray-200 dark:border-slate-700 rounded-xl p-6 text-center">
          <h3 class="text-xl font-bold mb-3">
            Tour Phú Quốc
          </h3>
          <p class="text-gray-600 dark:text-slate-300 mb-4">
            4 ngày 3 đêm
          </p>
          <p class="text-2xl font-bold text-sky-600 dark:text-sky-400">
            5.900.000đ
          </p>
        </div>

        <div class="border border-gray-200 dark:border-slate-700 rounded-xl p-6 text-center">
          <h3 class="text-xl font-bold mb-3">
            Tour Đà Lạt
          </h3>
          <p class="text-gray-600 dark:text-slate-300 mb-4">
            2 ngày 1 đêm
          </p>
          <p class="text-2xl font-bold text-sky-600 dark:text-sky-400">
            2.200.000đ
          </p>
        </div>

      </div>
    </div>

  </div>
</section>
</body>
</html>
