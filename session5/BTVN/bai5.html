<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #footer {
        width: 100vw;
        border: none;
        background-color: rgb(39, 39, 97);
        padding: min(1vh, 2%);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .text {
        margin-left: 1rem;
        color: rgb(108, 105, 105);
      }
      .nav-item {
        margin-right: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      a {
        color: white;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <footer id="footer">
      <div class="text">@ 2026 Bản quyền thuộc về Ban.</div>
      <div class="nav-item">
        <a href="">Facebook</a>
        <a href="">Twitter</a>
        <a href="">Linkelin</a>
        <a href="">instagram</a>
      </div>
    </footer>
  </body>
</html>
