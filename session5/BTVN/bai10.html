<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        flex: 1 1 250px;
        padding: min(2vh, 4%);
        border: 1px solid #ccc;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">Member 1</div>
      <div class="card">Member 2</div>
      <div class="card">Member 3</div>
    </div>
  </body>
</html>
