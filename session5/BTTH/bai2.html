<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
         *{
            margin : 0;
            padding : 0;
            box-sizing: border-box;
        }
        #main {
            border: 1px solid rgb(24, 126, 190);
            width: 30vw;
            height: fit-content;
            padding: min(2vh,4%);
            margin : auto;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        #name{
            font-weight: bold;
        }
         #content{
            color :rgb(149, 147, 147)
         }
        #text{
            color: rgb(217, 80, 22);
            font-weight: 400;
        }
        img{
          border-radius: 50%;
          object-fit: cover;
        }
      
    </style>
  </head>
  <body>
    <div id="main">
      <img src="./anh-mo-ta.jpg" alt="anh-mo-ta" width="70px" height="70px">
      <div id="content">Nguyễn Văn C</div>
      <div id="text">"Thái độ quyết định trình độ"</div>
    </div>
  </body>
</html>
