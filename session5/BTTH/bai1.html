<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #main {
        background-color: rgb(46, 64, 234);
        width: 100vw;
        padding: min(2vh, 4%);
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }
      a{
        color: white;
      }
      .nav-item{
        display: flex;
        align-items: center;
        gap: 15px;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <div>MyPortfolio</div>
      <div class="nav-item">
        <a href="">Giới thiệu</a>
        <a href="">Kỹ năng</a>
        <a href="">Dự án</a>
        <a href="">Liên hệ</a>
      </div>
    </div>
  </body>
</html>
