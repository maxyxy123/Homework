<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Báo Cáo Tài Chính Năm</h1>
    <table border="1px" style="border: 1px solid black;">
      <thead>
        <caption style="font-size: 15px;">
          Báo cáo doanh thu và lợi nhuận các quý trong năm
        </caption>
      </thead>
      <tbody>
        <tr >
          <th style="font-weight: bold;">Chỉ tiêu</th>
          <th>Quý 1</th>
          <th>Quý 2</th>
          <th>Quý 3</th>
          <th>Quý 4</th>
        </tr>

        <tr>
          <td style="font-weight: bold;">Doanh thu (Tỷ VNĐ)</td>
          <td>500</td>
          <td>650</td>
          <td>700</td>
          <td>850</td>
        </tr>

        <tr>
          <td style="font-weight: bold;">Lợi nhuận (Tỷ VNĐ)</td>
          <td>120</td>
          <td>180</td>
          <td>210</td>
          <td>250</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
