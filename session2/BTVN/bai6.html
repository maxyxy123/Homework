<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Hồ sơ thông tin cá nhân</h1>
    <form>
      <fieldset>
        <legend>Thông tin cá nhân</legend>
        <label>Tên</label>
        <input type="text" placeholder="Nhập họ và tên" />
       
          <label style="display:block ;margin-top: 20px;" ></label>Ngày sinh:</label>
          <input type="date">
      </fieldset>

       <fieldset>
        <legend>Thông tin liên hệ</legend>
        <label>Email:</label>
        <input type="email" placeholder="example@email.com" />
       
          <label style="display:block ;margin-top: 20px;" ></label>Số điện thoại:</label>
          <input type="number" placeholder="0912345678">
      </fieldset>

      <label style="display: block;margin-bottom: 20px;">Ghi chú bổ sung:</label>
        <textarea style="width: 300px; margin-bottom: 20px; height: 100px;" name="ghi-chú" placeholder="Nhập ghi chú của bạn tại đây..." ></textarea>

      <button style="display: block;" type="submit">Lưu hồ sơ</button>
    </form>
  </body>
</html>
