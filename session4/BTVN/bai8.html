<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .header {
        background: #557a9f;
        padding: 15px;
        color: white;
      }

      .logo {
        float: left;
        font-size: 20px;
        font-weight: bold;
      }

  
      .nav {
        float: right;
      }

      .nav a {
        color: white;
        text-decoration: none;
        margin-left: 14px;
      }

     
      .clear {
        clear: both;
      }

      .content {
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">TechZone</div>

      <div class="nav">
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
      </div>

      <div class="clear"></div>
    </div>

    <div class="content">
      <h2>Chào mừng bạn đến với TechZone!</h2>
      <p>
        Đây là nội dung trang webb kobị tràn lên phần header phía trên nhờ kỹ
        thuật clear float.
      </p>
    </div>
  </body>
</html>
