<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      #main {
        border: 1px solid red;
        text-align: center;
        padding: min(2vh, 4%);
      }

      .title {
        font-weight: bold;
        margin-bottom: 12px;
      }

      .box {
        display: inline-block;
        border: 1px solid blue;
        width: 140px;
        height: 50px;
        line-height: 50px;
        text-align: center;
        border-radius: 5px;
        margin: 6px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <div class="title">Danh mục Sản phẩm nổii bật</div>
      <div class="box">Laptop</div>
      <div class="box">Điện thoại</div>
      <div class="box">Phụ kiện điện tử</div>
      <div class="box">Máy tính bảng</div>
      <div class="box">Đồng hồ thông minh</div>
    </div>
  </body>
</html>
