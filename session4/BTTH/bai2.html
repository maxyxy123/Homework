<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
         *{
            margin : 0;
            padding : 0;
            box-sizing: border-box;
        }
        #main {
            border: 1px solid rgb(24, 126, 190);
            width: 30vw;
            height: 25vh;
            padding: min(2vh,4%);
            margin : auto;
            border-radius: 10px;
        }
        #name{
            font-weight: bold;
        }
         #content{
            color :rgb(149, 147, 147)
         }
        #name, #content{
            margin-bottom: 1rem;
        }
        #price{
            color: rgb(217, 80, 22);
            font-weight: bold;
        }
      
    </style>
  </head>
  <body>
    <div id="main">
      <div id="name">Điện Thoại Thông Minh X</div>
      <div id="content">Màn hình 6,5 inch ,camera sắc nét, pin dung lượng cao phù hợp cho cả ngày dài.</div>
      <div id="price">Giá : 15.000.000 VNĐ</div>
    </div>
  </body>
</html>
