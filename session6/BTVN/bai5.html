<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-5">
    <div class="card p-4 shadow-sm rounded-4">
      <h2 class="mb-4 text-center">Thêm sách mới</h2>

      <form>
        <div class="mb-4">
          <label for="tenSach" class="form-label">Tên sách</label>
          <input type="text" class="form-control form-control-lg rounded-3" id="tenSach" placeholder="Nhập tên sách">
        </div>

        <div class="mb-4">
          <label for="tacGia" class="form-label">Tác giả</label>
          <input type="text" class="form-control form-control-lg rounded-3" id="tacGia" placeholder="Nhập tên tác giả">
        </div>

        <div class="mb-4">
          <label for="theLoai" class="form-label">Thể loại</label>
          <select class="form-select form-select-lg rounded-3" id="theLoai-sachs">
            <option selected>Chọn thể loại</option>
            <option value="van-hoc">1</option>
            <option value="kinh-te">2</option>
            <option value="khoa-hoc">3</option>
            <option value="thieu-nhi">4</option>
            <option value="cong-nghe">5</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3">
          Thêm sách
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
