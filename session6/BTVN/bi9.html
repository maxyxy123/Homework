<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --rikkei-red: #8b0000;
      --rikkei-black: #000000;
    }

    .btn-primary {
      --bs-btn-color: #ffffff;
      --bs-btn-bg: var(--rikkei-red);
      --bs-btn-border-color: var(--rikkei-red);
      --bs-btn-hover-color: #ffffff;
      --bs-btn-hover-bg: #6f0000;
      --bs-btn-hover-border-color: #6f0000;
      --bs-btn-active-bg: #5a0000;
      --bs-btn-active-border-color: #5a0000;
    }

    .btn-secondary {
      --bs-btn-color: #ffffff;
      --bs-btn-bg: var(--rikkei-black);
      --bs-btn-border-color: var(--rikkei-black);
      --bs-btn-hover-color: #ffffff;
      --bs-btn-hover-bg: #222222;
      --bs-btn-hover-border-color: #222222;
      --bs-btn-active-bg: #111111;
      --bs-btn-active-border-color: #111111;
    }
  </style>
</head>
<body>

  <div class="container mt-5">
    <div class="p-5 rounded-4 shadow text-center">
      <h1 class="mb-3"> Rikkei Academy</h1>
      <p class="mb-4">
       Lorem, ipsum dolor sit amet consectetur adipisicing elit. Aut neque, molestiae eaque esse aperiam, quia iure illum laboriosam est iusto cum. Velit doloribus culpa, maiores amet obcaecati repellendus similique unde.
      </p>

      <button class="btn btn-primary btn-lg me-2">
        Đăng Ký Ngay
      </button>

      <button class="btn btn-secondary btn-lg">
        Xem Chi Tiết
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
